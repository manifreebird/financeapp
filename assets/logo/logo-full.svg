<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100" fill="none">
  <!-- Wallet icon with gradient background -->
  <defs>
    <linearGradient id="wallet-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9a56"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <filter id="icon-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#ff6b6b" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="10" y="14" width="72" height="72" rx="20" fill="url(#wallet-gradient)" filter="url(#icon-shadow)"/>

  <!-- Wallet body -->
  <rect x="23" y="34" width="46" height="32" rx="5" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wallet flap -->
  <path d="M30 34V30a7 7 0 017-7h18a7 7 0 017 7v4" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Coin clasp -->
  <circle cx="58" cy="50" r="5" stroke="#fff" stroke-width="2" fill="none"/>
  <line x1="58" y1="47" x2="58" y2="53" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>

  <!-- "mis finanzas" handwritten style -->
  <text x="96" y="58" font-family="'Caveat', 'Segoe Script', 'Comic Sans MS', cursive" font-size="38" font-weight="600" fill="#2d2d2d">mis finanzas</text>

  <!-- Tagline -->
  <text x="97" y="76" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#b0876e" letter-spacing="1">tu plata, tu control</text>
</svg>
