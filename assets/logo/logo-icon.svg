<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 88" fill="none">
  <defs>
    <linearGradient id="wallet-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9a56"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <filter id="icon-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#ff6b6b" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="8" y="8" width="72" height="72" rx="20" fill="url(#wallet-gradient)" filter="url(#icon-shadow)"/>

  <!-- Wallet body -->
  <rect x="21" y="28" width="46" height="32" rx="5" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wallet flap -->
  <path d="M28 28V24a7 7 0 017-7h18a7 7 0 017 7v4" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Coin clasp -->
  <circle cx="56" cy="44" r="5" stroke="#fff" stroke-width="2" fill="none"/>
  <line x1="56" y1="41" x2="56" y2="47" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
</svg>
